name: Build Check

on: [push, pull_request]

jobs:
  check-build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1
    
    - name: Build Project
      run: msbuild CyberSecurityAwareness_Chatbot.csproj /p:Configuration=Debug
